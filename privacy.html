<h1>Политика конфиденциальности</h1>
<p>Мы используем Firebase Authentication для входа через Google/Apple.</p>
<p>Данные хранятся в Firebase Firestore и используются только для сохранения игрового прогресса.</p>
<p>Мы не передаём данные третьим лицам.</p>
<p>Вы можете удалить свои данные, написав на pethabit.app@gmail.com</p>
